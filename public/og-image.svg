<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0f0f0f"/>
  <!-- Subtle gold gradient glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f5a623" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#0f0f0f" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Wordmark -->
  <text
    x="600"
    y="290"
    font-family="Arial, Helvetica, sans-serif"
    font-size="110"
    font-weight="bold"
    text-anchor="middle"
    fill="#f5a623"
    letter-spacing="-3"
  >PayCycle</text>
  <!-- Tagline -->
  <text
    x="600"
    y="370"
    font-family="Arial, Helvetica, sans-serif"
    font-size="36"
    text-anchor="middle"
    fill="#888888"
  >Make every paycheck count.</text>
</svg>
